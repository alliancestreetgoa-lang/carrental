name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend (prisma generate + tsc)
        run: npm run build --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
          DIRECT_URL: postgresql://user:pass@localhost:5432/db?schema=public

      - name: Build frontend (next build + typecheck)
        run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Lint frontend (non-blocking)
        run: npm run lint --workspace=apps/frontend
        continue-on-error: true
